<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Reportes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card *ngFor="let reporte of reportes" button (click)="abrirReporte(reporte)">
    <ion-card-header>
      <div class="card-header-content">
        <ion-icon [name]="reporte.icon" [color]="reporte.color" class="reporte-icon"></ion-icon>
        <ion-card-title>{{ reporte.nombre }}</ion-card-title>
      </div>
    </ion-card-header>
  </ion-card>
</ion-content>
